name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }}

      - name: Package portable (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $bin = "src-tauri/target/${{ matrix.target }}/release/scmdb-watcher.exe"
          Copy-Item $bin "scmdb-watcher-${{ github.ref_name }}-windows-x64.exe"
          Compress-Archive -Path $bin -DestinationPath "scmdb-watcher-${{ github.ref_name }}-windows-x64.zip"

      - name: Package portable (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          cp src-tauri/target/${{ matrix.target }}/release/scmdb-watcher \
            "scmdb-watcher-${{ github.ref_name }}-linux-x64"
          tar -czf "scmdb-watcher-${{ github.ref_name }}-linux-x64.tar.gz" \
            -C src-tauri/target/${{ matrix.target }}/release scmdb-watcher

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            scmdb-watcher-${{ github.ref_name }}-windows-x64.exe
            scmdb-watcher-${{ github.ref_name }}-windows-x64.zip
            scmdb-watcher-${{ github.ref_name }}-linux-x64
            scmdb-watcher-${{ github.ref_name }}-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
